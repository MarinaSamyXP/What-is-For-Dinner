<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <!-- ^ font from google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
      rel="stylesheet"
    />
    <!-- ^ Font Awesome -->
    <link rel="stylesheet" href="./css/all.min.css" />
    <!-- ^ CSS ==> Bootstrap -->
    <link rel="stylesheet" href="./css/bootstrap.min.css" />
    <!-- ^ Main StyleSheet -->
    <link rel="stylesheet" href="./css/style.css" />
    <!-- ^ Media Queries -->
    <link rel="stylesheet" href="./css/media.css" />
  </head>
  <body>
    <!-- & Navbar -->
    <nav class="navbar navbar-expand-lg bg-body-tertiary py-3 px-4">
      <div class="container d-flex align-items-center justify-content-between">
        <a class="navbar-brand d-flex" href="#">
          <i
            class="fa-solid fa-utensils text-white rounded-circle me-2 d-flex align-items-center justify-content-center"
          ></i>
          <div>
            <h1 class="m-0 fw-bold">What's For Dinner</h1>
            <p class="m-0 cg">Your daily meal inspiration</p>
          </div>
        </a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
          aria-controls="navbarNav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon align-self-start"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto d-flex gap-2 py-3 py-lg-0">
            <li
              class="nav-item d-flex align-items-center justify-content-start mb-2 mb-md-0"
            >
              <a class="nav-link active" aria-current="page" href="#"
                ><i class="fa-solid fa-bookmark me-2"></i
              ></a>
              <span class="">Saved Recipes</span>
            </li>
            <li
              class="nav-item d-flex align-items-center justify-content-start mb-2 mb-md-0"
            >
              <a class="nav-link" href="#"
                ><i class="fa-solid fa-clock-rotate-left me-2"></i
              ></a>
              <span>Recent</span>
            </li>
            <li
              class="nav-item d-flex align-items-center justify-content-start mb-2 mb-md-0"
            >
              <a class="nav-link" href="#"
                ><i class="fa-solid fa-gear me-2"></i
              ></a>
              <span>Settings</span>
            </li>
            <li
              class="nav-item d-flex align-items-center justify-content-start mb-2 mb-md-0"
            >
              <a class="nav-link" href="#"
                ><img
                  class="img-fluid rounded-circle me-2"
                  src="https://storage.googleapis.com/uxpilot-auth.appspot.com/avatars/avatar-4.jpg"
                  alt="profile picture"
              /></a>
              <span>Profile</span>
            </li>
          </ul>
        </div>
      </div>
    </nav>
    <!-- & Dinner Section -->
    <div class="dinner">
      <div class="container rounded-4 overflow-hidden bg-white">
        <div class="row g-0" id="dinner"></div>
      </div>
    </div>

    <script src="./js/bootstrap.bundle.min.js"></script>
    <script src="./js/index.js"></script>
  </body>
</html>
